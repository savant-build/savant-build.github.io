<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #0f172a;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 60px 80px;
      overflow: hidden;
    }
    .top {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .top svg { flex-shrink: 0; }
    .top span {
      font-size: 24px;
      font-weight: 600;
      color: #38bdf8;
    }
    .title {
      font-size: 52px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .bottom {
      font-size: 20px;
      color: #94a3b8;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="top">
    <svg width="48" height="48" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="48" y1="18" x2="20" y2="42" stroke="#38bdf8" stroke-width="4" opacity="0.4"/>
      <line x1="48" y1="18" x2="76" y2="42" stroke="#38bdf8" stroke-width="4" opacity="0.4"/>
      <line x1="20" y1="54" x2="48" y2="78" stroke="#38bdf8" stroke-width="4" opacity="0.4"/>
      <line x1="76" y1="54" x2="48" y2="78" stroke="#38bdf8" stroke-width="4" opacity="0.4"/>
      <line x1="20" y1="48" x2="76" y2="48" stroke="#38bdf8" stroke-width="3" opacity="0.2" stroke-dasharray="4 3"/>
      <circle cx="48" cy="14" r="14" fill="#38bdf8"/>
      <circle cx="18" cy="48" r="14" fill="#38bdf8" opacity="0.8"/>
      <circle cx="78" cy="48" r="14" fill="#38bdf8" opacity="0.8"/>
      <circle cx="48" cy="82" r="14" fill="#34d399"/>
      <circle cx="48" cy="14" r="5" fill="#0f172a"/>
      <circle cx="18" cy="48" r="5" fill="#0f172a"/>
      <circle cx="78" cy="48" r="5" fill="#0f172a"/>
      <circle cx="48" cy="82" r="5" fill="#0f172a"/>
    </svg>
    <span>Savant Build</span>
  </div>
  <div class="title">{{TITLE}}</div>
  <div class="bottom">savantbuild.org</div>
</body>
</html>
