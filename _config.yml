title: Savant Build
email: brian@pontarelli.com
description: >
  Savant Build tool is a simple and elegant way to take back control of
  your software. With a SemVer compliant dependency management system,
  Savant just works.
baseurl: ""
url: "https://savantbuild.org"
github_username: savant-build

# Build settings
markdown: kramdown
highlighter: rouge

permalink: pretty

exclude:
  - node_modules
  - package.json
  - package-lock.json
  - postcss.config.js
  - tailwind.config.js
  - Gemfile
  - Gemfile.lock
  - README.md
  - .claude
  - scripts
